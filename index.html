<!DOCTYPE html>
<html>
<head>
  <title>Hello from Vercel</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      overflow: hidden;
      position: relative;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,128,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,128,0.06) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridSlide 20s linear infinite;
    }

    @keyframes gridSlide {
      from { transform: translate(0, 0); }
      to { transform: translate(40px, 40px); }
    }

    .glow-orb {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,255,128,0.15) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    }

    .container {
      position: relative;
      text-align: center;
      z-index: 10;
    }

    .badge {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.3em;
      color: #00ff80;
      border: 1px solid rgba(0,255,128,0.4);
      padding: 6px 16px;
      margin-bottom: 32px;
      animation: fadeIn 0.5s ease forwards;
      opacity: 0;
    }

    .badge::before { content: '▶ '; opacity: 0.7; }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 800;
      color: #fff;
      line-height: 1;
      letter-spacing: -0.02em;
      animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    h1 span {
      color: #00ff80;
      display: inline-block;
      position: relative;
    }

    h1 span::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 0;
      width: 100%;
      height: 3px;
      background: #00ff80;
      transform: scaleX(0);
      transform-origin: left;
      animation: underline 0.5s ease 1s forwards;
    }

    @keyframes underline { to { transform: scaleX(1); } }

    .sub {
      margin-top: 20px;
      font-size: 11px;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.3);
      animation: fadeIn 0.5s ease 0.6s forwards;
      opacity: 0;
    }

    .status {
      margin-top: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      animation: fadeIn 0.5s ease 0.8s forwards;
      opacity: 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00ff80;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .status-text {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.4);
    }

    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

    .corner {
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: rgba(0,255,128,0.4);
      border-style: solid;
      border-width: 0;
    }
    .corner.tl { top: -12px; left: -12px; border-top-width: 1px; border-left-width: 1px; }
    .corner.tr { top: -12px; right: -12px; border-top-width: 1px; border-right-width: 1px; }
    .corner.bl { bottom: -12px; left: -12px; border-bottom-width: 1px; border-left-width: 1px; }
    .corner.br { bottom: -12px; right: -12px; border-bottom-width: 1px; border-right-width: 1px; }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow-orb"></div>
  <div class="container">
    <div style="position:relative; display:inline-block; padding: 20px 40px;">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="badge">NAVIGATE THE COURSE</div>
      <h1>AI FOR PHARMA <span>MARKETERS</span></h1>
      <div class="sub">DEPLOYED TO THE EDGE · GLOBAL CDN · INSTANT</div>
      <div class="status">
        <div class="dot"></div>
        <span class="status-text">ALL SYSTEMS OPERATIONAL</span>
      </div>
    </div>
  </div>
</body>
</html>
